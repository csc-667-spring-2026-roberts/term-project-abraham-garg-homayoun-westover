services:
  - type: web
    name: spades
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: spades-db
          property: connectionString

databases:
  - name: spades-db
    databaseName: spades
    user: spades
